<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kebab na Plazy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="images/logo.png" alt="Restaurant Logo" class="logo">
        <h1>Kebab na Plaży</h1>
        <p>Fresh • Tasty • Made Daily</p>
    </header>

    <main>

        <section class="menu-section">
            <h2>Kebabs</h2>

            <div class="menu-item">
                <span>Classic Kebab</span>
                <span>25 zł</span>
            </div>

            <div class="menu-item">
                <span>Chicken Kebab</span>
                <span>28 zł</span>
            </div>

            <div class="menu-item">
                <span>Mixed Kebab</span>
                <span>30 zł</span>
            </div>
        </section>

        <section class="menu-section">
            <h2>Pizzas</h2>

            <div class="menu-item">
                <span>Margherita</span>
                <span>32 zł</span>
            </div>

            <div class="menu-item">
                <span>Pepperoni</span>
                <span>38 zł</span>
            </div>

            <div class="menu-item">
                <span>Hawaiian</span>
                <span>39 zł</span>
            </div>
        </section>

        <section class="menu-section">
            <h2>Drinks</h2>

            <div class="menu-item">
                <span>Coca-Cola</span>
                <span>8 zł</span>
            </div>

            <div class="menu-item">
                <span>Water</span>
                <span>5 zł</span>
            </div>

            <div class="menu-item">
                <span>Orange Juice</span>
                <span>10 zł</span>
            </div>
        </section>

    </main>

</body>
</html>
